name: Cron - News Purge
on:
  schedule:
    - cron: '0 4 * * *'  # 11 PM ET ≈ 4:00 UTC (daily)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.ALPHATERM_URL }}/api/jobs/news-purge" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
