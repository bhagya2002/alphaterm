name: Cron - Emerging Stocks Research
# 9 AM ET; market news, discovery candidates - each gets independent focused research
on:
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.ALPHATERM_URL }}/api/jobs/emerging-research" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
