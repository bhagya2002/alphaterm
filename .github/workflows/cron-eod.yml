name: Cron - EOD Report
on:
  schedule:
    - cron: '45 20 * * 1-5'  # 3:45 PM ET (20:45 UTC)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.ALPHATERM_URL }}/api/jobs/eod-report" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
