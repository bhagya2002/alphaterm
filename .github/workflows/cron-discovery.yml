name: Cron - Discovery Run
on:
  schedule:
    - cron: '5 14 * * 1-5'  # 9:05 AM ET (14:05 UTC)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X GET "${{ secrets.ALPHATERM_URL }}/api/discovery/run" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
