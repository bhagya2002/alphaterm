name: Cron - Overnight Prep
on:
  schedule:
    - cron: '0 7 * * 1-5'  # 2:00 AM ET (7:00 UTC)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.ALPHATERM_URL }}/api/jobs/overnight-prep" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
